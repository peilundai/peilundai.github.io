<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  function renderMermaidDiagrams(theme) {
    mermaid.initialize({ startOnLoad: false, theme: theme });

    document.querySelectorAll('pre code.language-mermaid').forEach(function(el) {
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.setAttribute('data-mermaid-source', el.textContent);
      div.textContent = el.textContent;
      el.parentElement.replaceWith(div);
    });

    document.querySelectorAll('.mermaid').forEach(function(el) {
      var source = el.getAttribute('data-mermaid-source') || el.textContent;
      el.setAttribute('data-mermaid-source', source);
      el.removeAttribute('data-processed');
      el.textContent = source;
    });

    mermaid.init(undefined, document.querySelectorAll('.mermaid'));
  }

  window.renderMermaidDiagrams = renderMermaidDiagrams;
  renderMermaidDiagrams(
    document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default'
  );
</script>
