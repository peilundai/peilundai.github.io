<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% seo %}
<link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
{% feed_meta %}
<script>
  (function() {
    var t = localStorage.getItem('theme');
    if (t) { document.documentElement.setAttribute('data-theme', t); return; }
    // Respect OS preference first, then fall back to local time (dark 7pm-7am)
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var hour = new Date().getHours();
    var timeDark = hour >= 19 || hour < 7;
    if (prefersDark || timeDark)
      document.documentElement.setAttribute('data-theme', 'dark');
  })();
</script>
