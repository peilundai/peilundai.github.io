<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}" data-theme="light">
  <head>
    {% include head.html %}
  </head>
  <body>
    {% include nav.html %}

    <main class="site-content">
      <div class="container">
        {{ content }}
      </div>
    </main>

    {% include footer.html %}

    {% if page.math %}
      {% include mathjax.html %}
    {% endif %}

    {% if page.mermaid %}
      {% include mermaid.html %}
    {% endif %}

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
