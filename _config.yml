title: Peilun Dai
logo: /assets/img/logo.png
description: Research Engineer at the Institute of High Performance Computing (IHPC), A*STAR, Singapore
url: "https://peilundai.com"
baseurl: ""
author: Peilun Dai
github_username: peilundai
linkedin_username: peilundai
twitter_username: PeilunDai

# Build
markdown: kramdown
kramdown:
  math_engine: null
  input: GFM
  syntax_highlighter: rouge
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

# Blog
paginate: 10
paginate_path: "/blog/page:num/"

# Navigation
navigation:
  - title: Home
    url: /
  - title: Blog
    url: /blog/

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-feed

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - node_modules
